version: 2

project_name: orchard

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: orchard
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/rahulkj/orchard/cmd.Version={{.Version}}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

homebrew_casks:
  - name: orchard
    repository:
      owner: rahulkj
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/rahulkj/orchard"
    description: "Kubernetes clusters where every node is its own apple/container VM"
    binaries:
      - orchard

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  github:
    owner: rahulkj
    name: orchard
